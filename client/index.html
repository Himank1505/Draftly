<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draftly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .tiptap { outline: none; }
    .tiptap h1 { font-size: 1.8rem; font-weight: 700; margin: 0.75em 0 0.4em; }
    .tiptap h2 { font-size: 1.4rem; font-weight: 700; margin: 0.75em 0 0.4em; }
    .tiptap h3 { font-size: 1.15rem; font-weight: 700; margin: 0.75em 0 0.4em; }
    .tiptap p  { margin: 0 0 0.6em; }
    .tiptap ul { padding-left: 1.5rem; list-style: disc; margin: 0 0 0.6em; }
    .tiptap ol { padding-left: 1.5rem; list-style: decimal; margin: 0 0 0.6em; }
    .tiptap li { margin-bottom: 0.2em; }
    .tiptap blockquote { border-left: 3px solid #cbd5e1; padding-left: 1rem; color: #64748b; margin: 0 0 0.6em; }
    .tiptap code { background: #f1f5f9; border-radius: 3px; padding: 0.1em 0.35em; font-size: 0.9em; font-family: monospace; }
    .tiptap pre  { background: #1e293b; color: #e2e8f0; border-radius: 6px; padding: 1rem; overflow-x: auto; margin: 0 0 0.8em; }
    .tiptap pre code { background: none; padding: 0; font-size: 0.9em; }
    .tiptap hr   { border: none; border-top: 2px solid #e2e8f0; margin: 1.5em 0; }
    .tiptap table { border-collapse: collapse; width: 100%; margin: 0 0 0.8em; }
    .tiptap td, .tiptap th { border: 1px solid #cbd5e1; padding: 0.5rem 0.75rem; min-width: 60px; }
    .tiptap th { background: #f8fafc; font-weight: 600; }
    .tiptap .selectedCell { background: #eff6ff; }
  </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
